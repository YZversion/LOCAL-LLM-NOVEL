model:
  # 阶段2:Ollama 推理
  provider: ollama
  ollama_model: "huihui_ai/qwen3-abliterated:8b-v2"
  ollama_base_url: "http://localhost:11434"

  # 阶段4:微调基座(届时解注释)
  # hf_base_model: "Qwen/Qwen2.5-7B-Instruct"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  story_bible: "data/story_bible"
  models: "models"
  outputs: "outputs"

retrieval:
  top_k: 5            # grep 最多返回几个命中块
  bible_top_k: 3      # 设定集 BM25 最多返回几条
  grep_context_lines: 3  # 命中行前后各保留几行

session:
  max_recent_chars: 2000   # 喂给模型的「当前上文」窗口
  summary_trigger_chars: 4000  # 超过此字数触发滚动摘要压缩
  output_tokens: 600       # 单次续写最大 token 数

generation:
  temperature: 0.8
  top_p: 0.8
  top_k: 20
  repeat_penalty: 1.15       # 1.05→1.15：轻度提高对重复 token 的惩罚
  repeat_last_n: 256         # 默认64→256：惩罚窗口覆盖完整循环周期
  presence_penalty: 0.3      # 出现即惩罚：降低已出现词/短语再次被采样概率
  frequency_penalty: 0.3     # 出现越多惩罚越重：进一步抑制高频短语
  dry_multiplier: 0.8        # DRY 核心：复现已有序列时的惩罚系数
  dry_base: 1.75             # DRY 指数底：重复序列越长惩罚指数增长
  dry_allowed_length: 2      # DRY 免疫长度：≤2字叠词不受影响
  dry_penalty_last_n: 512    # DRY 检测窗口：覆盖完整生成上文

